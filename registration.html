<html>
<head>
<title>registration form</title>
<script>
function passvalues(
var name=document.getElementById("name",name).value;
var email=document.getElementById("email",email).value;
var address=document.getElementById("address",address).value;
localStorage.setItem("name",name);
localStorage.setItem("email",email);
localStorage.setItem("address",address);
)
</script>
</head>
<body>
<h2>REGISTRATION FORM</h2>
<form action ="details.html">

<legend>REGISTRATION form</legend>
<label>Name</label>
<input type="text" id="name"/><br><br>
<label>Email</label>
<input type="email" id="email"/><br><br>
<label>Address</label>
<input type="address" id="address"/><br><br>
<input type="submit" value="submit" onclick=passvalues()/><br><br>

</form>
</body>
</html>
